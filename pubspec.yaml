name: otel_drift
description: OpenTelemetry instrumentation for `package:drift`. Helpers
  to wrap drift queries / transactions with `db.system=sqlite` semconv
  spans.
version: 0.1.0-beta.1-wip
repository: https://github.com/Dartastic/otel_drift
homepage: https://dartastic.io

environment:
  sdk: ^3.0.0

dependencies:
  dartastic_opentelemetry: ^1.1.0-beta.4
  dartastic_opentelemetry_api: ^1.0.0-beta.6
  drift: ^2.0.0

dev_dependencies:
  pubspec_parse: ^1.5.0
  pub_semver: ^2.0.0
  dart_flutter_team_lints: ^3.5.2
  test: ^1.26.3
